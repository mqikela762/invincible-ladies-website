<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7fb;

      padding: 20px;
      text-align: center;
    }

    nav {

      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 40px 20px;
    }

    h2 {
      color: #5a2a82;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;

    button {

    .info {

<header>
  <h1>Contact Us</h1>

<nav>
  <a href="index.html">Home</a>

<div class="container">

  <h2>Get in Touch</h2>

  <form name="contact" method="POST" data-netlify="true">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>

  <div class="info">
    <h2>Other Contact Details</h2>
    <p><strong>Email:</strong> info@invincibleladies.org.za</p>
    <p><strong>Phone:</strong> +27 00 000 0000</p>
    <p><strong>WhatsApp:</strong> +27 00 000 0000</p>

</div>
